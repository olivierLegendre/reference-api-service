name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      REFERENCE_API_PERSISTENCE_BACKEND: in_memory
      REFERENCE_API_POSTGRES_AUTO_INIT: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Export OpenAPI
        run: python scripts/export_openapi.py

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src

      - name: Unit tests
        run: pytest -m "not postgres_integration"

  postgres_integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reference_api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d reference_api"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      REFERENCE_API_TEST_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/reference_api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Postgres integration tests
        run: pytest -m postgres_integration
