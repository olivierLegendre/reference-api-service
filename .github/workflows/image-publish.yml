name: Image Publish

# Wave 8 hardening pipeline.
# W8-01 TODO: add explicit SBOM/provenance attestation verification gate policy document linkage.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional explicit image tag (example: v0.2.0 or rc-1)'
        required: false
        type: string
      image_namespace:
        description: 'GHCR namespace (default: olivierlegendre)'
        required: false
        default: 'olivierlegendre'
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: image-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sign-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image refs
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.image_namespace }}" ]]; then
            NAMESPACE="${{ inputs.image_namespace }}"
          else
            NAMESPACE="olivierlegendre"
          fi
          NAMESPACE="$(printf '%s' "$NAMESPACE" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/$NAMESPACE/reference-api-service"

          SHA_TAG="sha-${GITHUB_SHA::12}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.image_tag }}" ]]; then
            PRIMARY_TAG="${{ inputs.image_tag }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            PRIMARY_TAG="${{ github.ref_name }}"
          else
            PRIMARY_TAG="$SHA_TAG"
          fi

          PRIMARY_REF="$IMAGE:$PRIMARY_TAG"
          TAGS="$PRIMARY_REF"
          if [[ "$PRIMARY_TAG" != "$SHA_TAG" ]]; then
            TAGS="$TAGS\n$IMAGE:$SHA_TAG"
          fi

          {
            echo "namespace=$NAMESPACE"
            echo "image=$IMAGE"
            echo "primary_ref=$PRIMARY_REF"
            echo "tags<<EOF2"
            echo -e "$TAGS"
            echo "EOF2"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: OIDC keyless sign image
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          cosign sign --yes "${{ steps.vars.outputs.primary_ref }}"

      - name: Verify keyless signature
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          set -euo pipefail
          cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer-regexp ".*" "${{ steps.vars.outputs.primary_ref }}" >/dev/null

      - name: Vulnerability gate (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.vars.outputs.primary_ref }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
