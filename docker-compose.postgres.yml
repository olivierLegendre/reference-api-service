services:
  postgres:
    image: postgres:16
    container_name: reference-api-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reference_api
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reference_api"]
      interval: 5s
      timeout: 5s
      retries: 20
